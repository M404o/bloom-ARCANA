<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Bloom Arcana — Cosmos Reading</title>
<style>
  html,body {
    height:100%; margin:0; overflow:hidden;
    background:#000; color:#fff;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue";
  }
  /* Camera fullscreen background */
  video#cam {
    position:fixed; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    z-index:0;
  }
  /* Scene overlay on camera */
  #scene {
    position:fixed; inset:0;
    z-index:10;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    pointer-events:none;
  }
  .card {
    position:absolute;
    width:140px;
    transform-origin:center bottom;
    opacity:0;
    will-change:transform,opacity;
  }
  .flower {
    position:absolute;
    width:300px;
    opacity:0;
    transform-origin:center center;
    will-change:transform,opacity;
  }
  /* Card rise in */
  @keyframes riseCard {
    0%   { transform: translateY(40px) rotateX(30deg) scale(0.9); opacity:0; }
    60%  { transform: translateY(-6px) rotateX(0deg) scale(1.02); opacity:1; }
    100% { transform: translateY(0) rotateX(0) scale(1); opacity:1; }
  }
  /* Card fade out */
  @keyframes fadeOut {
    0%   { opacity:1; transform:scale(1); }
    100% { opacity:0; transform:scale(0.95); }
  }
  /* Flower bloom in */
  @keyframes flowerIn {
    0%   { opacity:0; transform:translateY(20px) scale(0.85); }
    60%  { opacity:1; transform:translateY(-8px) scale(1.05); }
    100% { opacity:1; transform:translateY(0) scale(1); }
  }
  /* Flower gentle float */
  @keyframes floatY {
    0%   { transform: translateY(0); }
    50%  { transform: translateY(-8px); }
    100% { transform: translateY(0); }
  }
  .card.show { animation: riseCard 520ms cubic-bezier(.2,.9,.2,1) forwards; }
  .card.hide { animation: fadeOut 320ms ease forwards; }
  .flower.show { animation: flowerIn 640ms cubic-bezier(.2,.9,.2,1) forwards; }
  .flower.float { animation: floatY 3000ms ease-in-out infinite; }

  #cam-error {
    display:none; position:fixed; bottom:20px; left:50%;
    transform:translateX(-50%); z-index:20;
    background:rgba(0,0,0,0.6); padding:8px 14px;
    border-radius:8px; font-size:12px; color:#fff;
  }
</style>
</head>
<body>

<video id="cam" autoplay playsinline muted></video>

<div id="scene">
  <img id="card1" class="card" src="./cosmos/moon.png" alt="The Moon"
       style="top:28%; left:calc(50% - 190px);" />
  <img id="card2" class="card" src="./cosmos/devil.png" alt="The Devil Reverse"
       style="top:24%; left:calc(50% - 70px);" />
  <img id="card3" class="card" src="./cosmos/page-of-cups.png" alt="Page of Cups"
       style="top:28%; left:calc(50% + 50px);" />
  <img id="flower" class="flower" src="./cosmos/cosmos.png" alt="Cosmos"
       style="top:42%; left:calc(50% - 150px);" />
</div>

<div id="cam-error"></div>

<script>
  const cardEls = [
    document.getElementById('card1'),
    document.getElementById('card2'),
    document.getElementById('card3')
  ];
  const flowerEl = document.getElementById('flower');
  const cam = document.getElementById('cam');

  const t_cardGap = 420;
  const t_afterCards = 380;

  function playSequence() {
    // 1) Cards rise one by one
    cardEls.forEach((c, idx) => {
      setTimeout(() => c.classList.add('show'), idx * t_cardGap);
    });

    // 2) Cards fade out
    const totalCardsTime = (cardEls.length - 1) * t_cardGap + 600;
    setTimeout(() => {
      cardEls.forEach(c => c.classList.add('hide'));
    }, totalCardsTime + t_afterCards);

    // 3) Flower blooms and floats forever
    setTimeout(() => {
      flowerEl.classList.add('show');
      setTimeout(() => flowerEl.classList.add('float'), 700);
    }, totalCardsTime + t_afterCards + 360);
  }

  // Start rear camera, THEN play animation after camera is ready
  (async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' },
        audio: false
      });
      cam.srcObject = stream;
      // Wait for camera to actually show frames
      cam.addEventListener('playing', () => {
        setTimeout(playSequence, 500);
      }, { once: true });
    } catch(e) {
      document.getElementById('cam-error').style.display = 'block';
      document.getElementById('cam-error').textContent = 'Camera unavailable — preview mode';
      // Play anyway without camera
      playSequence();
    }
  })();
</script>
</body>
</html>
