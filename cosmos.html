<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Bloom Arcana — Cosmos Reading</title>
<style>
  html,body {
    height:100%; margin:0;
    background:#0a0a0a;
    color:#fff;
    font-family: 'Georgia', 'Times New Roman', serif;
    overflow-x:hidden;
  }
  #stage {
    display:flex; flex-direction:column; align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:40px 20px;
    box-sizing:border-box;
  }
  h1 {
    font-size:18px; font-weight:400; letter-spacing:0.15em;
    opacity:0; margin-bottom:32px;
    animation: fadeIn 1s ease 0.3s forwards;
  }
  .cards {
    display:flex; gap:12px; justify-content:center;
    flex-wrap:wrap; margin-bottom:36px;
  }
  .card {
    width:120px; opacity:0;
    border-radius:8px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.6);
    transform: translateY(40px) scale(0.9);
  }
  .card.show {
    animation: riseCard 700ms cubic-bezier(.2,.9,.2,1) forwards;
  }
  .flower-wrap {
    opacity:0; text-align:center;
    transform: translateY(20px) scale(0.9);
  }
  .flower-wrap.show {
    animation: flowerIn 900ms cubic-bezier(.2,.9,.2,1) forwards;
  }
  .flower-wrap.float {
    animation: floatY 3s ease-in-out infinite;
  }
  .flower-wrap img {
    width:min(280px, 70vw);
    filter: drop-shadow(0 4px 20px rgba(255,182,193,0.3));
  }
  .message {
    margin-top:28px; font-size:14px;
    letter-spacing:0.08em; opacity:0;
    text-align:center; line-height:1.8;
    color:rgba(255,255,255,0.7);
  }
  .message.show {
    animation: fadeIn 800ms ease forwards;
  }

  @keyframes fadeIn {
    from { opacity:0; }
    to { opacity:1; }
  }
  @keyframes riseCard {
    0% { transform: translateY(40px) scale(0.9); opacity:0; }
    60% { transform: translateY(-6px) scale(1.02); opacity:1; }
    100%{ transform: translateY(0) scale(1); opacity:1; }
  }
  @keyframes flowerIn {
    0% { opacity:0; transform:translateY(20px) scale(0.9); }
    60%{ opacity:1; transform:translateY(-6px) scale(1.05); }
    100%{ opacity:1; transform:translateY(0) scale(1); }
  }
  @keyframes floatY {
    0% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
    100%{ transform: translateY(0); }
  }
</style>
</head>
<body>
<div id="stage">
  <h1>Your Cosmos Reading</h1>

  <div class="cards">
    <img id="card1" class="card" src="./cosmos/moon.png" alt="The Moon" />
    <img id="card2" class="card" src="./cosmos/devil.png" alt="The Devil Reverse" />
    <img id="card3" class="card" src="./cosmos/page-of-cups.png" alt="Page of Cups" />
  </div>

  <div id="flower" class="flower-wrap">
    <img src="./cosmos/cosmos.png" alt="Cosmos Flower" />
  </div>

  <p id="msg" class="message">
    The Moon — The Devil (R) — Page of Cups<br/>
    Let go, or believe?
  </p>
</div>

<script>
  const cards = [document.getElementById('card1'), document.getElementById('card2'), document.getElementById('card3')];
  const flower = document.getElementById('flower');
  const msg = document.getElementById('msg');

  // Sequence: cards appear one by one, then flower blooms, then message
  cards.forEach((card, i) => {
    setTimeout(() => card.classList.add('show'), 800 + i * 600);
  });

  const afterCards = 800 + cards.length * 600 + 400;

  setTimeout(() => {
    flower.classList.add('show');
    setTimeout(() => flower.classList.add('float'), 1000);
  }, afterCards);

  setTimeout(() => {
    msg.classList.add('show');
  }, afterCards + 900);
</script>
</body>
</html>
